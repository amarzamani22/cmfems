<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Medic · FEMS</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell" id="shell">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">
        <img src="logo.png" alt="Car Medic" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="sb-logo-fallback" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
      </div>
      <div class="sb-brand-text">
        <span class="sb-name">FEMS</span>
        <span class="sb-sub">Car Medic · v1.0</span>
      </div>
    </div>

    <nav class="sb-nav" id="sb-nav">
      <div class="sb-section-label">Main</div>
      <button class="nav-item" data-page="overview">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Overview</span>
      </button>
      <button class="nav-item" data-page="equipment">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="2"/>
          <path d="M16 8h4l3 3v5h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
        <span>Equipment</span>
        <span class="nav-count" id="nav-count-equipment">9</span>
      </button>
      <button class="nav-item" data-page="facilities">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/>
        </svg>
        <span>Facilities</span>
      </button>

      <div class="sb-section-label">Operations</div>
      <button class="nav-item" data-page="maintenance">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
        </svg>
        <span>Maintenance</span>
        <span class="nav-count danger" id="nav-count-maintenance">2</span>
      </button>
      <button class="nav-item" data-page="history">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>History</span>
      </button>
      <button class="nav-item" data-page="templates">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11H3v10h6V11zM21 3h-6v18h6V3zM15 7H9v4h6V7z"/>
        </svg>
        <span>PM Templates</span>
      </button>

      <div class="sb-section-label">Inventory</div>
      <button class="nav-item" data-page="parts">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
          <line x1="7" y1="7" x2="7.01" y2="7"/>
        </svg>
        <span>Parts</span>
      </button>

      <div class="sb-section-label">Analytics</div>
      <button class="nav-item" data-page="reports">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Reports</span>
      </button>
    </nav>

    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">—</div>
        <div class="sb-user-text">
          <div class="sb-uname" id="sb-uname">Not signed in</div>
          <div class="sb-urole" id="sb-urole">—</div>
        </div>
        <button class="icon-btn sb-logout-btn" data-action="logout" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main-wrap" id="main-wrap">
    <header class="topbar">
      <div class="tb-left">
        <button class="icon-btn" id="menu-btn" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="breadcrumb" id="breadcrumb">Overview</div>
      </div>
      <div class="tb-right">
        <label class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" id="search-input" placeholder="Search equipment, jobs…" class="search-input" autocomplete="off">
        </label>
        <div class="notif-wrap" id="notif-wrap">
          <button class="icon-btn notif-btn" id="notif-btn" title="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span class="notif-dot" id="notif-dot" style="display:none;">0</span>
          </button>
          <div class="notif-panel" id="notif-panel" style="display:none;"></div>
        </div>
        <button class="icon-btn" id="theme-btn" title="Toggle theme">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="page-content" class="page-content"></main>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal-box" id="modal-box">
    <div id="modal-inner"></div>
  </div>
</div>

<!-- ── TOASTS ── -->
<div id="toasts" class="toast-stack"></div>

<script src="js/data.js"></script>
<script src="js/core.js"></script>
<script src="js/pages.js"></script>
<script src="js/modals.js"></script>
</body>
</html>
